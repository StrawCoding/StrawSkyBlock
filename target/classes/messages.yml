  already-exists: "<red>這座空島已經有一台小機器人了。"
  limit-reached: "<red>你已達到可建立的小機器人數量上限（{max}）。"
  created: "<green>已在 <yellow>{x}, {y}, {z}</yellow> 建立小機器人！請使用 <yellow>/is robot chest</yellow> 連結箱子後再 <yellow>/is robot start</yellow>。"
  item-received: "<green>已將小機器人放入你的背包！在自己的島上<yellow>右鍵地面</yellow>即可放置部署。"
  placed: "<green>已在 <yellow>{x}, {y}, {z}</yellow> 放置小機器人！對著小人<yellow>右鍵</yellow>再點箱子可連結存放箱。"
  picked-up: "<green>已拿起小機器人並放回背包（保留等級）。"
  bind-start: "<yellow>請點擊島上的一個箱子，以連結為小機器人的存放箱。"
  auto-started: "<green>小機器人已自動開始挖礦！"
  place-not-on-island: "<red>只能在自己的空島範圍內放置小機器人。"
