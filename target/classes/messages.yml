robot:
  disabled: "<red>小機器人功能目前未啟用。"
  usage: "<gray>用法：/is robot <speed|length|start|stop|info|help>"
  help:
    - "<gold>═══════ <yellow>小機器人使用說明</yellow> ═══════"
    - "<gray>機器人會自動挖掘範圍內的<white>鵝卵石</white>並放入綁定的箱子，挖到的還有機率變成礦物。"
    - "<yellow>① <white>/is robotshop</white> <gray>購買，機器人會放入你的<white>背包</white>"
    - "<yellow>② <gray>在刷石機旁<white>右鍵地面</white>放置機器人小人（要在自己的島上）"
    - "<yellow>③ <gray>對著小人<white>右鍵</white>，再<white>點擊島上的箱子</white>即可連結存放箱並<white>自動開始挖礦</white>"
    - "<gray>拿起：<white>左鍵小人</white> 收回背包（保留等級、自動移除）"
    - "<gray>升級：<white>/is robot speed <1-6></white> 加快速度、<white>/is robot length <1-6></white> 擴大範圍"
    - "<gray>控制：<white>/is robot stop</white> 暫停、<white>/is robot start</white> 繼續、<white>/is robot info</white> 查看狀態"
    - "<dark_gray>提示：箱子滿了會自動暫停（不會掉物），箱子被拆會自動停機。"
    - "<gold>══════════════════════════"
  level-usage: "<gray>用法：/is robot <speed|length> <1-6>"
