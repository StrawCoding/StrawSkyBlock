plugin:
  debug: false
  language: zh_TW

# 錯誤診斷：StrawSkyBlock 控制的流程（重生回家、島嶼傳送、/spawn 攔截、建立/造訪/重置/管理員傳送）
# 失敗時，會於 console 以 [StrawSkyBlock][錯誤診斷] 前綴印出一小塊可定位問題的錯誤區塊。
diagnostics:
  # 是否將錯誤區塊另存到插件資料夾的 error-log.txt（方便事後查閱）。
  write-file: true
  # 發生錯誤時，是否向線上且具 strawskyblock.admin.diag 權限的管理員發送提示。
  notify-admins: true
  # 記憶體中保留的最近錯誤筆數（供 /is admin diag 查詢）。
  max-records: 20
  # 例外堆疊保留的行數上限（避免再次淹沒日誌）。
  stack-frames: 8

# 客戶端同步安全傳送：跨世界傳送（空島 ↔ 主世界／spawn）時，伺服器端常回報成功但客戶端
# 仍卡在「載入地形」。以下設定提供區塊票證、多次重新同步、Paper 區塊送達檢查與卡住恢復。
teleport:
  # v1.0.26 傳送偵測總開關。
  #   false（預設）：跨世界傳送仍會預載並保留目的地區塊、執行（同步）傳送，但「不再進行傳送後偵測」——
  #     不啟動客戶端活動追蹤、不做成功後驗證、不做卡住恢復、不做最終強制重連（kick），
  #     也不會因偵測「可疑」而輸出診斷或顯示傳送失敗訊息。
  #   true：恢復完整偵測／恢復流程（客戶端交握偵測 -> 驗證 -> 恢復 -> 最終 kick）。
  detection-enabled: false
  # v1.0.12 跨世界傳送策略：
  #   PRELOAD_WAIT_SYNC（預設，治本）：預載並保留目的地區塊 -> 等待數 tick -> 主執行緒同步傳送
  #     -> 等待客戶端活動穩定 -> 必要時才走恢復／最終 kick。先確保區塊備妥再傳送，降低「載入地形」凍結，
  #     並減少對重新同步轟炸的依賴。
  #   LEGACY_ASYNC_RESYNC：v1.0.11 舊行為（teleportAsync + 多次重新同步 + 驗證）。
  strategy: PRELOAD_WAIT_SYNC
  # PRELOAD_WAIT_SYNC：預載／保留目的地區塊後，等待多少 tick 再執行同步傳送（20 tick = 1 秒）。
  preload-wait-ticks: 10
  # PRELOAD_WAIT_SYNC：同步傳送完成後，等待多少 tick 觀察客戶端是否完成維度交握後才驗證；
  # 唯有此視窗過後仍可疑，才會啟動有界的卡住恢復與最終 kick。
  client-activity-wait-ticks: 40
  # PRELOAD_WAIT_SYNC：跨世界傳送是否使用主執行緒同步傳送（Player#teleport）；關閉時改用 teleportAsync。
  use-sync-cross-world-teleport: true
  # 跨世界傳送後，是否延遲重新同步座標／區塊封包（僅 LEGACY_ASYNC_RESYNC 策略使用）。
  resync-enabled: true
  # 第一次重新同步於傳送完成後多少 tick 執行（20 tick = 1 秒）。
  resync-delay-ticks: 20
  # 重新同步次數（含第一次）；後續次數會交替微調 Y 座標，強制客戶端重收區塊。
  resync-max-attempts: 3
  # 各次重新同步之間的間隔 tick。
  resync-interval-ticks: 10
  # 最後一次重新同步後多少 tick 進行成功後驗證。
  verify-delay-ticks: 40
  # 驗證仍可疑時，是否嘗試更強的卡住恢復（預載 3x3 區塊 + Y 微調來回傳送）。
  recovery-enabled: true
  # 卡住恢復後，再次驗證前等待的 tick。
  recovery-reverify-delay-ticks: 20
  # 跨世界傳送期間是否於落點 3x3 區塊加上 plugin chunk ticket。
  chunk-ticket: true
  # 跨世界傳送後，是否要求偵測到客戶端主動封包（移動／互動／指令／背包／揮手）才算交握完成。
  # 開啟時：若驗證視窗內玩家仍停在落點且毫無客戶端活動，即判定為「伺服器正常但客戶端卡在載入地形」，
  # 觸發卡住恢復；恢復後仍無動靜則輸出繁體中文診斷（不會無限重送，恢復為有界一次）。
  client-ack-required: true
  # v1.0.11：卡住恢復後驗證仍可疑（跨世界）時，是否執行最終有界處置：強制重新連線（kick）。
  # 用於伺服器端已到位、區塊已送達，但客戶端維度交握仍凍結（OnGround=0、無位移、卡在載入地形）的剩餘案例。
  final-fallback-kick-enabled: true
  # 最終恢復 kick 時顯示給玩家的繁體中文訊息（MiniMessage 格式，不含插件前綴）。
  final-fallback-kick-message: "<yellow>偵測到跨世界傳送後客戶端維度交握未完成（畫面可能卡在「載入地形」）。</yellow><newline><gray>已為您執行安全重新連線，請重新登入後再試。</gray>"

# 在空島世界內攔截 /spawn（HuskHomes），改走 Paper-safe 的 chunk 同步傳送，避免客戶端卡在「載入地形」。
spawn-intercept:
  enabled: true
  # 與 HuskHomes 相同權限；無權限時不攔截，交由 HuskHomes 處理拒絕訊息。
  permission: huskhomes.command.spawn
  # 相對於伺服器根目錄；優先讀取 HuskHomes 的出生點設定。
  huskhomes-spawn-file: plugins/HuskHomes/spawn.yml

database:
  type: mysql
  host: localhost
  port: 3306
  database: straw_skyblock
  username: root
  password: password
  pool-size: 10
  # 額外連線參數
  use-ssl: false

world:
  island-world: straw_skyblock_world
  void-generator: true
  island-spacing: 1000
  island-size: 200
  island-y: 100
  # v1.0.28 下界（地獄）獨立空島模式：每座島擁有與主世界相同座標的專屬下界區域。
  #   走原本的下界傳送門（NETHER_PORTAL）會自動 1:1 對應導向，不套用原版 8 倍縮放。
  nether-enabled: true
  # 下界使用的虛空世界名稱（NETHER 環境）。
  nether-world: straw_skyblock_world_nether
  # 玩家首次經由傳送門抵達下界落點時，是否自動於落點下方鋪一小塊基岩安全平台，
  #   避免「地形尚未生成」時一過傳送門就掉入虛空。關閉則為純虛空（玩家自理）。
  nether-safe-platform: true
  # v1.0.29 將伺服器原版世界（主世界/地獄/終界）改為純虛空。
  #   主世界（level-name，預設 world）作為大廳：純虛空，僅於出生點放置一個草方塊供站立，
  #   不帶任何 SkyBlock 功能（保護／刷石機／機器人等只作用於 SkyBlock 世界）。
  #   原版地獄/終界一併淨空為虛空。注意：保留 portal 事件機制（不使用 allow-nether=false），
  #   以免影響 SkyBlock 下界傳送門。
  vanilla-void-enabled: true
  # 主世界（大廳）名稱，通常等於 server.properties 的 level-name。
  vanilla-overworld: world
  # 是否於主世界出生點放置一個草方塊（玩家站在其上）。
  vanilla-overworld-grass: true
  # 一併納入虛空淨空的原版世界（地獄／終界），這些世界不放任何方塊。
  vanilla-void-worlds:
    - world_nether
    - world_the_end

island:
  max-islands-per-player: 1
  create-cost: 0
  reset-cost: 0
  delete-confirm-seconds: 15
  default-template: default

template:
  default:
    type: internal
    spawn-offset:
      x: 0
      y: 3
      z: 0

generator:
  enabled: true
  only-generated-cobblestone: true
  fortune-support: false
  # 挖到礦物時是否於聊天列顯示「挖出了 X」訊息（預設關閉，避免連挖洗版）
  notify-ore-drop: false
  drops:
    COBBLESTONE: 57.4
    COAL: 13.0
    RAW_COPPER: 8.0
    RAW_IRON: 7.0
    RAW_GOLD: 4.0
    REDSTONE: 4.0
    LAPIS_LAZULI: 2.5
    EMERALD: 1.0
    DIAMOND: 1.0
    QUARTZ: 1.0
    AMETHYST_SHARD: 1.0
    ANCIENT_DEBRIS: 0.1

animal-spawn:
  enabled: true
  trigger: COBBLESTONE_BREAK
  chance: 0.01
  cooldown-seconds-per-island: 30
  max-passive-mobs-per-island: 30
  animals:
    CHICKEN: 25
    COW: 18
    SHEEP: 18
    PIG: 18
    RABBIT: 10
    WOLF: 5
    CAT: 4
    VILLAGER: 2

robot:
  # 小機器人：自動挖掘掃描範圍內的鵝卵石並存入連結的箱子。
  enabled: true
  # 每位玩家可部署的機器人數量「預設」上限；可被 LuckPerms 權限節點覆寫：
  #   strawskyblock.robot.limit.<n>（取玩家擁有的最大數值；無此類權限時採用本預設值）。
  default-limit: 5
  # 於機器人商城購買一台機器人的費用（需啟用 Vault 經濟系統才會扣款；設為 0 則免費）。
  purchase-cost: 50000.0
  # 挖到的方塊是否套用刷石機掉落表（true = 有機率挖出礦物；false = 固定鵝卵石）。
  use-generator-drops: true
  # 掃描的垂直半徑（原點上下各幾格）。
  vertical-range: 1
  # 新購買機器人的預設等級。
  default-level: 1
  # 排程基礎週期（tick）；每台機器人實際挖掘間隔由等級決定，此值僅為掃描解析度。
  task-period-ticks: 1
  # 找不到等級定義時的後備值。
  fallback-interval-ticks: 200
  fallback-range: 2
  # 統一等級 L1~L6：每升一級「挖得更快」且「掃描範圍更大」。
  #   interval-ticks：挖掘間隔，越小越快（20 tick = 1 秒）。
  #   range：水平掃描半徑（格），越大範圍越廣。
  #   cost：升級到此等級所需花費（需啟用 Vault 經濟系統才會扣款，否則僅為佔位）。
  levels:
    1:
      interval-ticks: 200
      range: 2
      cost: 0
    2:
      interval-ticks: 160
      range: 3
      cost: 1000
    3:
      interval-ticks: 120
      range: 4
      cost: 2500
    4:
      interval-ticks: 80
      range: 5
      cost: 5000
    5:
      interval-ticks: 40
      range: 6
      cost: 10000
    6:
      interval-ticks: 20
      range: 7
      cost: 20000

protection:
  default-flags:
    visitor-break: false
    visitor-place: false
    visitor-container: false
    visitor-button: false
    visitor-pickup: false
    visitor-damage-animals: false
    pvp: false
    explosion: false
    fire-spread: false
    mob-griefing: false
    redstone: true

economy:
  enabled: true
  provider: Vault
  create-island-cost: 0

# 官方商城：玩家可將刷石機產出的礦物賣給伺服器換取金錢。
# buy-prices 為「每 1 個」的收購單價（需安裝 Vault 經濟系統才會生效）。
shop:
  enabled: true
  buy-prices:
    COAL: 2.0
    RAW_COPPER: 3.0
    RAW_IRON: 5.0
    RAW_GOLD: 8.0
    REDSTONE: 2.0
    LAPIS_LAZULI: 3.0
    QUARTZ: 3.0
    AMETHYST_SHARD: 5.0
    EMERALD: 12.0
    DIAMOND: 20.0
    ANCIENT_DEBRIS: 100.0

void-protection:
  enabled: true
  # 虛空防護 Y 閾值（小於等於此值時觸發傳送）
  y-threshold: 0
  # 傳送回島嶼前給予的無敵 tick 數
  invincibility-ticks: 40
  # 無島嶼玩家的 fallback 重生點（預設使用空島世界出生點）
  fallback-spawn:
    world: straw_skyblock_world
    x: 0.5
    y: 100.0
    z: 0.5
    yaw: 0
    pitch: 0
