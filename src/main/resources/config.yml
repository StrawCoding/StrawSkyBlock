plugin:
  debug: false
  language: zh_TW

# 錯誤診斷：StrawSkyBlock 控制的流程（重生回家、島嶼傳送、建立/造訪/重置/管理員傳送）
# 失敗時，會於 console 以 [StrawSkyBlock][錯誤診斷] 前綴印出一小塊可定位問題的錯誤區塊。
diagnostics:
  # 是否將錯誤區塊另存到插件資料夾的 error-log.txt（方便事後查閱）。
  write-file: true
  # 發生錯誤時，是否向線上且具 strawskyblock.admin.diag 權限的管理員發送提示。
  notify-admins: true
  # 記憶體中保留的最近錯誤筆數（供 /is admin diag 查詢）。
  max-records: 20
  # 例外堆疊保留的行數上限（避免再次淹沒日誌）。
  stack-frames: 8

database:
  type: mysql
  host: localhost
  port: 3306
  database: straw_skyblock
  username: root
  password: password
  pool-size: 10
  # 額外連線參數
  use-ssl: false

world:
  island-world: straw_skyblock_world
  void-generator: true
  island-spacing: 1000
  island-size: 200
  island-y: 100

island:
  max-islands-per-player: 1
  create-cost: 0
  reset-cost: 0
  delete-confirm-seconds: 15
  default-template: default

template:
  default:
    type: internal
    spawn-offset:
      x: 0
      y: 3
      z: 0

generator:
  enabled: true
  only-generated-cobblestone: true
  fortune-support: false
  drops:
    COBBLESTONE: 57.4
    COAL: 13.0
    RAW_COPPER: 8.0
    RAW_IRON: 7.0
    RAW_GOLD: 4.0
    REDSTONE: 4.0
    LAPIS_LAZULI: 2.5
    EMERALD: 1.0
    DIAMOND: 1.0
    QUARTZ: 1.0
    AMETHYST_SHARD: 1.0
    ANCIENT_DEBRIS: 0.1

animal-spawn:
  enabled: true
  trigger: COBBLESTONE_BREAK
  chance: 0.01
  cooldown-seconds-per-island: 30
  max-passive-mobs-per-island: 30
  animals:
    CHICKEN: 25
    COW: 18
    SHEEP: 18
    PIG: 18
    RABBIT: 10
    WOLF: 5
    CAT: 4
    VILLAGER: 2

robot:
  # 小機器人：自動挖掘掃描範圍內的鵝卵石並存入連結的箱子。
  enabled: true
  # 每位玩家（島嶼）可擁有的機器人數量上限。
  max-per-island: 1
  # 挖到的方塊是否套用刷石機掉落表（true = 有機率挖出礦物；false = 固定鵝卵石）。
  use-generator-drops: true
  # 掃描的垂直半徑（原點上下各幾格）。
  vertical-range: 1
  # 新建機器人的預設等級。
  default-speed-level: 1
  default-length-level: 1
  # 排程基礎週期（tick）；每台機器人實際挖掘間隔由速度等級決定，此值僅為掃描解析度。
  task-period-ticks: 1
  # 找不到等級定義時的後備值。
  fallback-interval-ticks: 200
  fallback-range: 2
  # 速度等級 L1~L6：interval-ticks 越小挖得越快（20 tick = 1 秒）。
  # cost 為升級花費（需啟用 Vault 經濟系統才會扣款，否則僅為佔位）。
  speed-levels:
    1:
      interval-ticks: 200
      cost: 0
    2:
      interval-ticks: 160
      cost: 1000
    3:
      interval-ticks: 120
      cost: 2500
    4:
      interval-ticks: 80
      cost: 5000
    5:
      interval-ticks: 40
      cost: 10000
    6:
      interval-ticks: 20
      cost: 20000
  # 長度 / 範圍等級 L1~L6：range 為水平掃描半徑（格），越大掃描範圍越廣。
  length-levels:
    1:
      range: 2
      cost: 0
    2:
      range: 3
      cost: 1000
    3:
      range: 4
      cost: 2500
    4:
      range: 5
      cost: 5000
    5:
      range: 6
      cost: 10000
    6:
      range: 7
      cost: 20000

protection:
  default-flags:
    visitor-break: false
    visitor-place: false
    visitor-container: false
    visitor-button: false
    visitor-pickup: false
    visitor-damage-animals: false
    pvp: false
    explosion: false
    fire-spread: false
    mob-griefing: false
    redstone: true

economy:
  enabled: true
  provider: Vault
  create-island-cost: 0
